<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神兽图鉴 - 天机</title>
    <link rel="stylesheet" href="../css/page.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/interactions.css">
    <link rel="stylesheet" href="../css/shanhai.css">
    <link rel="stylesheet" href="../css/fortune.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐉</text></svg>">
</head>
<body>
    <script src="../js/effects/particles.js"></script>
    <div class="page-container">
        <header class="page-header fade-in">
            <a href="main.html" class="back-btn">← 返回</a>
            <h1 class="page-title">🐉 神兽图鉴</h1>
            <div class="header-decoration"></div>
        </header>

        <main class="page-content">
            <section class="beasts-hero fade-in" style="--delay: 1">
                <div class="hero-content">
                    <div class="hero-badge">上古神兽</div>
                    <div class="hero-title">神兽图鉴</div>
                    <div class="hero-subtitle">探寻上古神兽，了解神兽象征意义与文化内涵</div>
                </div>
                <div class="hero-visual">
                    <div class="dragon-visual">
                        <span class="dragon-icon">🐉</span>
                        <div class="dragon-ring"></div>
                    </div>
                </div>
            </section>

            <section class="beasts-intro fade-in" style="--delay: 2">
                <div class="intro-card">
                    <div class="intro-header">
                        <div class="intro-icon">📜</div>
                        <h2 class="intro-title">神兽文化</h2>
                    </div>
                    <div class="intro-content">
                        <p>中华文化源远流长，神兽传说悠久深邃。</p>
                        <p>从龙凤麒麟到饕餮穷奇，上古神兽承载着先民对自然的敬畏与想象。</p>
                        <p>神兽不仅是祥瑞之征，更蕴含深厚的哲学思想与文化内涵。</p>
                    </div>
                    <div class="intro-stats">
                        <div class="stat-item">
                            <span class="stat-number">28</span>
                            <span class="stat-label">瑞兽</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-number">15</span>
                            <span class="stat-label">凶兽</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-number">20</span>
                            <span class="stat-label">神鸟</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-number">18</span>
                            <span class="stat-label">灵兽</span>
                        </div>
                    </div>
                </div>
            </section>

            <section class="beasts-category fade-in" style="--delay: 3">
                <div class="category-header">
                    <h2 class="category-title">
                        <span class="title-icon">🐲</span>
                        瑞兽
                    </h2>
                    <p class="category-desc">吉祥如意，祥瑞之兽</p>
                </div>
                <div class="beasts-grid" id="ruishouGrid"></div>
            </section>

            <section class="beasts-category fade-in" style="--delay: 4">
                <div class="category-header">
                    <h2 class="category-title">
                        <span class="title-icon">🦁</span>
                        凶兽
                    </h2>
                    <p class="category-desc">邪恶象征，警醒世人</p>
                </div>
                <div class="beasts-grid" id="xiongshouGrid"></div>
            </section>

            <section class="beasts-category fade-in" style="--delay: 5">
                <div class="category-header">
                    <h2 class="category-title">
                        <span class="title-icon">🦅</span>
                        神鸟
                    </h2>
                    <p class="category-desc">翱翔九天，神圣之鸟</p>
                </div>
                <div class="beasts-grid" id="shenniaoGrid"></div>
            </section>

            <section class="beasts-category fade-in" style="--delay: 6">
                <div class="category-header">
                    <h2 class="category-title">
                        <span class="title-icon">🐢</span>
                        灵兽
                    </h2>
                    <p class="category-desc">通灵之兽，智慧象征</p>
                </div>
                <div class="beasts-grid" id="lingshouGrid"></div>
            </section>

            <button class="more-details-floating-btn" id="moreDetailsBtn" title="查看深度神兽解析">
                <span class="btn-glow"></span>
                <span class="btn-content">
                    <span class="btn-icon">🐉</span>
                    <span class="btn-text">深度解析</span>
                </span>
            </button>
        </main>

        <footer class="page-footer">
            <p>© 2026 天机龙脉文化，仅供了解</p>
        </footer>
    </div>

    <section class="expanded-details" id="expandedDetails" style="display: none;">
        <div class="expanded-header">
            <h2>🐉 神兽深度解析</h2>
            <button class="close-expanded" id="closeExpanded">×</button>
        </div>
        <div class="expanded-content" id="expandedContent">
        </div>
    </section>

    <div class="modal" id="beastModal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose">×</button>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script src="../js/beasts.js"></script>
</body>
</html>
