<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>易经解读 - 天机</title>
    <link rel="stylesheet" href="../css/page.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/interactions.css">
    <link rel="stylesheet" href="../css/yijing.css">
    <link rel="stylesheet" href="../css/fortune.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☯</text></svg>">
</head>
<body>
    <script src="../js/effects/particles.js"></script>
    <div class="page-container">
        <header class="page-header fade-in">
            <a href="main.html" class="back-btn">← 返回</a>
            <h1 class="page-title">易经解读</h1>
            <div class="header-decoration"></div>
        </header>

        <main class="page-content">
            <section class="yijing-hero fade-in" style="--delay: 1">
                <div class="hero-content">
                    <div class="hero-badge">周易文化</div>
                    <div class="hero-title">易经六十四卦</div>
                    <div class="hero-subtitle">探索天地玄机，洞察人生奥秘</div>
                </div>
                <div class="hero-visual">
                    <div class="bagua-rotate">
                        <div class="bagua-circle">
                            <div class="bagua-inner">
                                <span class="bagua-char">☯</span>
                            </div>
                        </div>
                        <div class="bagua-trigrams">
                            <span class="trigram-item">☰</span>
                            <span class="trigram-item">☱</span>
                            <span class="trigram-item">☲</span>
                            <span class="trigram-item">☳</span>
                            <span class="trigram-item">☴</span>
                            <span class="trigram-item">☵</span>
                            <span class="trigram-item">☶</span>
                            <span class="trigram-item">☷</span>
                        </div>
                    </div>
                </div>
            </section>

            <section class="yijing-intro fade-in" style="--delay: 2">
                <div class="intro-card">
                    <div class="intro-header">
                        <div class="intro-icon">📜</div>
                        <h2 class="intro-title">关于易经</h2>
                    </div>
                    <div class="intro-content">
                        <p>《易经》乃群经之首，大道之源。涵盖天文、地理、人事、哲学之大成，</p>
                        <p>以阴阳二元论阐述天地万物变化之理。六十四卦，三百八十四爻，</p>
                        <p>每一卦象皆蕴含深刻哲理，指引人生方向。</p>
                    </div>
                    <div class="intro-features">
                        <div class="feature-item">
                            <span class="feature-icon">☰</span>
                            <span class="feature-text">乾为天</span>
                        </div>
                        <div class="feature-item">
                            <span class="feature-icon">☷</span>
                            <span class="feature-text">坤为地</span>
                        </div>
                        <div class="feature-item">
                            <span class="feature-icon">☵</span>
                            <span class="feature-text">坎为水</span>
                        </div>
                        <div class="feature-item">
                            <span class="feature-icon">☲</span>
                            <span class="feature-text">离为火</span>
                        </div>
                    </div>
                </div>
            </section>

            <section class="divination-section fade-in" style="--delay: 3">
                <div class="divination-card">
                    <div class="divination-header">
                        <div class="divination-icon">🔮</div>
                        <h2 class="divination-title">起卦占卜</h2>
                        <p class="divination-desc">诚心默念所问之事，摇动铜钱起卦</p>
                    </div>
                    <div class="divination-tools">
                        <div class="coins-container" id="coinsContainer">
                            <div class="coin-wrapper">
                                <div class="coin" data-side="1">☰</div>
                            </div>
                            <div class="coin-wrapper">
                                <div class="coin" data-side="2">☰</div>
                            </div>
                            <div class="coin-wrapper">
                                <div class="coin" data-side="3">☰</div>
                            </div>
                        </div>
                        <button class="btn btn-divinate" id="divinateBtn">
                            <span class="btn-icon">🎯</span>
                            <span class="btn-text">开始起卦</span>
                            <span class="btn-glow"></span>
                        </button>
                    </div>
                    <div class="divination-result" id="divinationResult" style="display: none;">
                        <div class="result-hexagram" id="resultHexagram"></div>
                        <div class="result-name" id="resultName"></div>
                        <div class="result-judgement" id="resultJudgement"></div>
                    </div>
                </div>
            </section>

            <section class="hexagram-library fade-in" style="--delay: 4">
                <div class="library-header">
                    <h2 class="library-title">
                        <span class="title-icon">📚</span>
                        六十四卦详解
                    </h2>
                    <p class="library-desc">点击卦象查看详细解读</p>
                </div>
                <div class="hexagrams-grid" id="hexagramsGrid"></div>
            </section>

            <button class="more-details-floating-btn" id="moreDetailsBtn" title="查看深度易经解读">
                <span class="btn-glow"></span>
                <span class="btn-content">
                    <span class="btn-icon">☯</span>
                    <span class="btn-text">深度解读</span>
                </span>
            </button>
        </main>

        <footer class="page-footer">
            <p>© 2026 天机龙脉文化，仅供了解</p>
        </footer>
    </div>

    <div class="modal" id="hexagramModal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose">×</button>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <section class="expanded-details" id="expandedDetails" style="display: none;">
        <div class="expanded-header">
            <h2>🔮 易经深度解读</h2>
            <button class="close-expanded" id="closeExpanded">×</button>
        </div>
        <div class="expanded-content" id="expandedContent">
        </div>
    </section>

    <script src="../js/yijing.js"></script>
</body>
</html>
