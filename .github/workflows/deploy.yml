name: 🚀 灵墟自动部署

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: 构建并部署
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🟢 安装Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 安装依赖
        run: npm ci

      - name: 🔍 代码检查
        run: npm run lint

      - name: 🏗️ 构建生产版本
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.SITE_URL }}
          
      - name: ✅ 构建验证
        run: |
          echo "✅ 构建成功！"
          ls -la .next/
          
      - name: 📢 部署完成通知
        run: |
          echo "========================================"
          echo "🎉 灵墟档案馆部署完成！"
          echo "🌐 访问地址：你的域名"
          echo "========================================"
