<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天机 - 玄学入口</title>
    <link rel="stylesheet" href="css/entrance.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☯</text></svg>">
</head>
<body>
    <div class="entrance-container">
        <div class="particles" id="particles"></div>
        
        <div class="taiji-container" id="taiji">
            <div class="taiji">
                <div class="yin"></div>
                <div class="yang"></div>
                <div class="symbol-yin"></div>
                <div class="symbol-yang"></div>
            </div>
            <div class="trigrams">
                <div class="trigram" data-value="☰">☰</div>
                <div class="trigram" data-value="☱">☱</div>
                <div class="trigram" data-value="☲">☲</div>
                <div class="trigram" data-value="☳">☳</div>
                <div class="trigram" data-value="☴">☴</div>
                <div class="trigram" data-value="☵">☵</div>
                <div class="trigram" data-value="☶">☶</div>
                <div class="trigram" data-value="☷">☷</div>
            </div>
        </div>
        
        <div class="title-container">
            <h1 class="title" id="title">
                <span class="char">天</span>
                <span class="char">机</span>
            </h1>
            <p class="subtitle">探索玄妙 · 洞察天机</p>
        </div>
        
        <div class="enter-hint" id="enterHint">
            <span>点击进入</span>
            <div class="pulse-ring"></div>
        </div>
        
        <div class="corner-decorations">
            <div class="corner tl"></div>
            <div class="corner tr"></div>
            <div class="corner bl"></div>
            <div class="corner br"></div>
        </div>
    </div>

    <script src="js/entrance.js"></script>
</body>
</html>
